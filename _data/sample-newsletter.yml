# Newsletter articles (full content)
articles:
  eu:
    - id: "eu-annex3-update"
      title: "EU AI Act Annex 3 Schedule Updated with Stricter Compliance Timelines"
      jurisdiction: "EU"
      category: "Regulatory Activity"
      date: "2026-02-28"
      source: "European Commission"
      summary: |
        The European Commission released revised implementation schedules for high-risk AI systems under Annex 3, 
        moving several compliance deadlines forward by 3-6 months. Organizations must submit conformity assessments 
        by April 15, 2026 instead of the previously announced July 1 deadline.
      compliance_impact: |
        If your organization develops or deploys high-risk AI systems in the EU, you now have 45 days to submit 
        conformity documentation. Start internal audits immediately and engage with notified bodies for assessment scheduling.
      url: "#"
      
    - id: "edpb-gdpr-guidance"
      title: "EDPB Issues Guidance on AI and GDPR Intersection"
      jurisdiction: "EU"
      category: "Regulatory Activity"
      date: "2026-02-25"
      source: "EDPB"
      summary: |
        The European Data Protection Board published detailed guidance clarifying how existing GDPR provisions 
        apply to AI systems, particularly regarding automated decision-making and data minimization requirements.
      url: "#"
      
  us:
    - id: "nist-framework-v2"
      title: "NIST AI Framework v2.0 Comment Period Closing Soon"
      jurisdiction: "US"
      category: "Federal Developments"
      date: "2026-02-27"
      source: "NIST"
      summary: |
        The National Institute of Standards and Technology is accepting public comments on the proposed AI Risk 
        Management Framework v2.0 through March 15, 2026. The updated framework includes expanded sections on 
        generative AI and foundation model governance.
      compliance_impact: |
        Review the draft framework and submit comments if your organization uses foundation models or generative AI. 
        The final version will likely shape future federal procurement requirements and industry best practices.
      url: "#"
      
    - id: "california-ab1234"
      title: "California AI Transparency Bill Advances in Committee"
      jurisdiction: "California"
      category: "State-Level Movements"
      date: "2026-02-26"
      source: "California State Assembly"
      summary: |
        California AB 1234, requiring disclosure labels on AI-generated content, passed the Assembly Privacy Committee 
        with bipartisan support. The bill would mandate watermarking and disclosure for synthetic media.
      url: "#"
      
  global:
    - id: "uk-lords-white-paper"
      title: "UK House of Lords Proposes AI Governance Framework"
      jurisdiction: "UK"
      category: "International Developments"
      date: "2026-02-24"
      source: "UK Parliament"
      summary: |
        The House of Lords AI Committee released a white paper proposing a principles-based regulatory approach 
        focused on sector-specific regulators rather than a single omnibus AI law.
      url: "#"
      
    - id: "china-cac-update"
      title: "China Updates AI Development Policy with Security Focus"
      jurisdiction: "China"
      category: "International Developments"
      date: "2026-02-28"
      source: "CAC"
      summary: |
        China's Cyberspace Administration released updated guidelines emphasizing "secure and controllable" AI development, 
        with new requirements for algorithm registration and content filtering.
      url: "#"
      
  research:
    - id: "stanford-ai-index-2026"
      title: "Stanford HAI Releases 2026 AI Index Report"
      category: "Research & Analysis"
      date: "2026-03-01"
      source: "Stanford HAI"
      summary: |
        The latest AI Index report shows 147% increase in AI-related legislation globally compared to 2025, 
        with enforcement actions up 89% year-over-year.
      url: "#"
